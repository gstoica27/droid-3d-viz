<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DROID 3D Trajectory Visualization</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #0d0d0d; color: #d4d4d4; }
.header { padding: 32px 40px 24px; border-bottom: 1px solid #222; }
.header h1 { font-size: 1.8rem; color: #f0f0f0; font-weight: 600; }
.header .subtitle { font-size: 0.9rem; color: #777; margin-top: 6px; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px 40px; }

/* Category cards grid */
.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-bottom: 32px; }
.cat-card {
  background: #161616; border: 1px solid #222; border-radius: 8px;
  padding: 16px; cursor: pointer; transition: border-color 0.2s;
}
.cat-card:hover { border-color: #555; }
.cat-name { font-size: 0.95rem; font-weight: 500; color: #e0e0e0; }
.cat-count { font-size: 0.75rem; color: #666; margin-top: 4px; }

/* Back button */
.back-btn {
  display: inline-block; padding: 6px 16px; margin-bottom: 20px;
  background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
  color: #aaa; cursor: pointer; font-size: 0.85rem;
}
.back-btn:hover { border-color: #555; color: #ddd; }

/* Video grid */
.video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(600px, 1fr)); gap: 20px; }
.video-card { background: #161616; border: 1px solid #222; border-radius: 8px; overflow: hidden; }
.video-card video { width: 100%; display: block; }
.video-info { padding: 10px 14px; }
.video-task { font-size: 0.82rem; color: #aaa; }
.video-id { font-size: 0.7rem; color: #555; margin-top: 2px; font-family: monospace; }

.footer { text-align: center; padding: 32px; color: #444; font-size: 0.75rem; }

#catView, #videoView { display: none; }
</style>
</head>
<body>
  <div class="header">
    <h1>DROID 3D Trajectory Visualization</h1>
    <p class="subtitle">50K robot manipulation scenes — 2D tracking + 3D trajectories from FoundationStereo depth</p>
  </div>
  <div class="container">
    <div id="catView"></div>
    <div id="videoView"></div>
  </div>
  <div class="footer">DROID 3D Trajectories &middot; FoundationStereo Depth &middot; MolmoPoint-8B Tracking &middot; AllTracker</div>

<script>
let manifest = null;

async function init() {
  try {
    const resp = await fetch('static/data/manifest.json');
    if (!resp.ok) throw new Error('Manifest fetch failed: ' + resp.status);
    manifest = await resp.json();
    showCategories();
  } catch(e) {
    document.getElementById('catView').style.display = 'block';
    document.getElementById('catView').innerHTML = '<p style="color:red;padding:20px">Error loading: ' + e.message + '</p>';
  }
}

function showCategories() {
  document.getElementById('videoView').style.display = 'none';
  const view = document.getElementById('catView');
  view.style.display = 'block';
  view.innerHTML = '';

  const clips = manifest.droid || [];
  const cats = {};
  for (const c of clips) {
    const cat = c.category || 'Other';
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push(c);
  }

  const grid = document.createElement('div');
  grid.className = 'cat-grid';

  // Sort by count descending
  const sorted = Object.entries(cats).sort((a, b) => b[1].length - a[1].length);
  for (const [cat, items] of sorted) {
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.innerHTML =
      '<div class="cat-name">' + cat + '</div>' +
      '<div class="cat-count">' + items.length + ' clips</div>';
    card.onclick = () => showVideos(cat, items);
    grid.appendChild(card);
  }
  view.appendChild(grid);
}

function showVideos(category, clips) {
  document.getElementById('catView').style.display = 'none';
  const view = document.getElementById('videoView');
  view.style.display = 'block';
  view.innerHTML = '';

  const back = document.createElement('div');
  back.className = 'back-btn';
  back.textContent = '← Back to categories';
  back.onclick = showCategories;
  view.appendChild(back);

  const title = document.createElement('h2');
  title.style.cssText = 'color:#e0e0e0; margin-bottom:16px; font-size:1.3rem;';
  title.textContent = category + ' (' + clips.length + ' clips)';
  view.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'video-grid';

  for (const c of clips) {
    const card = document.createElement('div');
    card.className = 'video-card';

    const video = document.createElement('video');
    video.controls = true;
    video.muted = true;
    video.preload = 'metadata';
    video.src = 'static/viz_videos/' + c.id + '.mp4';

    const info = document.createElement('div');
    info.className = 'video-info';
    info.innerHTML =
      '<div class="video-task">' + (c.text || c.task || '') + '</div>' +
      '<div class="video-id">' + c.id + '</div>';

    card.appendChild(video);
    card.appendChild(info);
    grid.appendChild(card);
  }
  view.appendChild(grid);
}

init();
</script>
</body>
</html>
